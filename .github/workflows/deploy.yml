name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_NEWS_API_URL: ${{ vars.VITE_NEWS_API_URL }}
          VITE_NEWS_API_KEY: ${{ secrets.VITE_NEWS_API_KEY }}
          VITE_SOURCES_ENDPOINT_PATH: ${{ vars.VITE_SOURCES_ENDPOINT_PATH }}
          VITE_TOP_HEADLINES_ENDPOINT_PATH: ${{ vars.VITE_TOP_HEADLINES_ENDPOINT_PATH }}
          VITE_LOGO_API_URL: ${{ vars.VITE_LOGO_API_URL }}
          VITE_LOGO_PUBLISHABLE_API_KEY: ${{ secrets.VITE_LOGO_PUBLISHABLE_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4